train:
  model_family: flow_matching
  objective: rectified_flow_source_anchored

paths:
  h5:
    train:
      h5_path: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/rightclean/simulation_train_rightclean_fixed34_gradshared.h5
      weight_h5: null
    val: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/rightclean/simulation_val_rightclean_fixed34_gradshared.h5
  sim_map: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/sim_map.json

dataloader:
  file: /scratch/project_2008261/pf_surrogate_modelling/models/train/core/pf_dataloader.py
  class: PFPairDataset
  args:
    input_channels: [0, 1]
    target_channels: [0, 1]
    identity_pairs: false
    use_pairs_idx: true
    add_thermal: true
    thermal_axis: x
    thermal_use_x0: true
    thermal_on_target: false
    return_cond: false
    normalize_images: true
    normalize_force: false
    normalize_source: file
  train_args:
    limit_per_group: 8
    max_items: 0.4
    augment: false
    augment_rotate: false
    augment_rotate_prob: 0.0
    augment_flip: false
    augment_swap: false
    augment_roll: false
  val_args:
    limit_per_group: 4
    max_items: 0.4
    augment: false

model:
  backbone: uvit_thermal
  params:
    in_channels: 4
    out_channels: 2
    channels: [16, 32, 32]
    heads: 2
    film_dim: 64
    theta_in_ch: 1
    theta_mode: film
    theta_hidden: 32
    attn_pool: 16
    attn_max_tokens: 512
    dropout: 0.0

loss:
  base: mse
  vmse_eps: 0.01
  weight_wavelet_loss: 0.0

flow_matching:
  sigma: 0.0

adaptive:
  region_selector: none
  enable_adaptive_resolution: false

conditioning:
  enabled: false
  use_theta: true
  theta_channels: 1

loader:
  batch_size: 1
  num_workers: 0
  pin_memory: true

trainer:
  seed: 1
  deterministic: true
  device: cuda
  epochs: 2
  steps_per_epoch: 2
  accumulation_steps: 1
  use_val: true
  out_dir: /scratch/project_2008261/pf_surrogate_modelling/runs/flowmatch_uvit_thermal_sourceanchored_gputest_smoke
  grad_clip: 1.0
  resume: false
  amp:
    enabled: true
    dtype: fp16
  channels_last: false
  metrics:
    mae: true
    psnr: true
    vrmse: true
    vrmse_eps: 1.0e-2
    spectral_rmse: false
    spectral_train: false
  early_stop:
    enabled: false
  use_wavelet_weights: false

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]

sched:
  name: cosine
  T_max: 2
  eta_min: 1.0e-6
  warmup_epochs: 0
  warmup_start_lr: 0.0

mlflow:
  enabled: false
