train:
  model_family: flow_matching
  objective: rectified_flow_source_anchored

paths:
  h5:
    train:
      h5_path: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/rightclean/simulation_train_rightclean_fixed34_gradshared.h5
      weight_h5: null
    val: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/rightclean/simulation_val_rightclean_fixed34_gradshared.h5
  sim_map: /scratch/project_2008261/pf_surrogate_modelling/data/stochastic/sim_map.json

dataloader:
  file: /scratch/project_2008261/pf_surrogate_modelling/models/train/core/pf_dataloader.py
  class: PFPairDataset
  args:
    input_channels: [0, 1]
    target_channels: [0, 1]
    identity_pairs: false
    use_pairs_idx: true
    add_thermal: true
    thermal_axis: x
    thermal_use_x0: true
    thermal_on_target: false
    return_cond: false
    normalize_images: true
    normalize_force: false
    normalize_source: file
  train_args:
    limit_per_group: null
    max_items: null
    augment: false
    augment_rotate: false
    augment_rotate_prob: 0.0
    augment_flip: false
    augment_swap: false
    augment_roll: false
  val_args:
    limit_per_group: null
    max_items: null
    augment: false

latent:
  enabled: true
  use_cached: false
  trainable: false
  # Point this to your finished AE checkpoint before launching.
  checkpoint: /scratch/project_2008261/pf_surrogate_modelling/runs/ae_latent_lola_big_64_1024_psgd_uncached_freq1_12g_latent32_nowavelet_rightclean_fixed34_gradshared_b40_precond64_p128/LatentAELoLAModel/checkpoint.best.pth
  autoencoder:
    file: /scratch/project_2008261/pf_surrogate_modelling/models/latent/autoencoder_lola.py
    class: LoLAAutoencoder2D
    params:
      in_channels: 2
      latent_channels: 32
      hid_channels: [64, 128, 256, 512, 768]
      hid_blocks: [3, 3, 3, 3, 3]
      stage_strides: null
      dropout: 0.05
      saturate_bound: 5.0
      saturate_kind: softclip2
      identity_init: true
      pixel_shuffle: true
      patch_size: 1
      norm: layer
      ffn_factor: 1
      periodic: y_left_replicate_right_reflect
  split_fields: false
  drop_thermal_target: false

model:
  backbone: uvit_thermal
  params:
    in_channels: 64
    out_channels: 32
    channels: [32, 64, 64]
    heads: 4
    film_dim: 128
    theta_in_ch: 1
    theta_mode: film
    theta_hidden: 64
    attn_pool: 4
    attn_max_tokens: 1024
    dropout: 0.0

loss:
  base: mse
  vmse_eps: 0.01
  weight_wavelet_loss: 0.0

flow_matching:
  sigma: 0.0

adaptive:
  region_selector: none
  enable_adaptive_resolution: false

conditioning:
  enabled: false
  use_theta: true
  theta_channels: 1

loader:
  batch_size: 2
  num_workers: 1
  pin_memory: true

trainer:
  seed: 1
  deterministic: true
  device: cuda
  epochs: 200
  steps_per_epoch: null
  accumulation_steps: 1
  use_val: true
  out_dir: /scratch/project_2008261/pf_surrogate_modelling/runs/flowmatch_uvit_thermal_sourceanchored_latent32
  grad_clip: 0.2
  resume: false
  amp:
    enabled: true
    dtype: fp16
  channels_last: false
  metrics:
    mae: true
    psnr: true
    vrmse: true
    vrmse_eps: 1.0e-2
    spectral_rmse: false
    spectral_train: false
  early_stop:
    enabled: false
  use_wavelet_weights: false

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]

sched:
  name: cosine
  T_max: 200
  eta_min: 1.0e-6
  warmup_epochs: 0
  warmup_start_lr: 0.0

mlflow:
  enabled: false
