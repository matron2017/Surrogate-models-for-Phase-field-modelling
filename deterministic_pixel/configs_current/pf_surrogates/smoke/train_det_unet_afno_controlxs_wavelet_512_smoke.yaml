train:
  model_family: surrogate

paths:
  h5:
    train: /scratch/project_2008261/pf_surrogate_modelling/Phase_field_surrogates/autoencoder_dc_ae/data/train.h5
    val: /scratch/project_2008261/pf_surrogate_modelling/Phase_field_surrogates/autoencoder_dc_ae/data/val.h5


dataloader:
  file: /scratch/project_2008261/pf_surrogate_modelling/Phase_field_surrogates/utils/pf_dataloader.py
  class: PFPairDataset
  args:
    data_key: images
    input_channels: [0, 1]
    target_channels: [0, 1]
    identity_pairs: false
    use_pairs_idx: true
    add_thermal: true
    thermal_axis: x
    thermal_use_x0: true
    thermal_on_target: false
    thermal_require_precomputed: true
    return_cond: false
    normalize_images: true
    normalize_force: false
    normalize_source: file
    normalize_thermal: true
    thermal_norm_source: file
  train_args:
    augment: false
  val_args:
    augment: false

latent:
  enabled: false
  use_cached: false
  trainable: false

model:
  backbone: unet_film_attn
  file: /scratch/project_2008261/pf_surrogate_modelling/Phase_field_surrogates/deterministic_pixel/scripts/det_pixel_model_entry.py
  class: UNetFiLMAttn
  params:
    in_channels: 2
    out_channels: 2
    cond_dim: 2
    channels: [128, 192, 256, 384, 512]
    num_blocks: [2, 2, 2, 2, 2]
    bottleneck_blocks: [2, 2]
    attn_heads: 8
    use_bottleneck_attn: false
    afno_depth: 12
    afno_mlp_ratio: 12.0
    afno_num_blocks: 16
    afno_inp_shape: [32, 32]
    afno_patch_size: [1, 1]
    afno_sparsity_threshold: 0.01
    afno_hard_thresholding_fraction: 1.0
    film_dim: 512
    time_emb_dim: 128
    dropout: 0.0
    padding: mixed_y_reflect
    use_time: false
    skip_film: true
    film_mode: affine
    use_control_branch: true
    hint_channels: 1
    control_strength: 1.5
    control_channels: [64, 96, 128, 160, 192]

loss:
  base: mse
  vmse_eps: 0.01
  weight_wavelet_loss: 0.30
  wavelet_curriculum:
    enabled: true
    stages:
      - mix: 0.30
        gain: 5000.0
        mask_enabled: false
  wavelet_mask:
    enabled: false
  wavelet_weight:
    J: 3
    wave: haar
    mode: zero
    strategy: multiband
    level_weights: [2.0, 1.4, 0.7]
    lowpass_weight: 1.2
    power: 1.8
    beta_w: 120.0
    normalize: true
    norm_quantile: 0.95
    combine_norm: true
    rescale_max: false
    clip_max: 16.0
    thicken_mode: max
    thicken_radius: 5
    shared_map: true
    shared_channels: [0, 1]
    shared_reduce: max

conditioning:
  enabled: false
  use_theta: true
  theta_channels: 1
  theta_normalization: none
  theta_eps: 1.0e-6

loader:
  batch_size: 1
  num_workers: 0
  pin_memory: true

trainer:
  seed: 1
  deterministic: false
  device: cuda
  epochs: 1
  steps_per_epoch: 10
  accumulation_steps: 1
  use_val: true
  out_dir: /scratch/project_2008261/pf_surrogate_modelling/Phase_field_surrogates/deterministic_pixel/runs/det_unet_afno_controlxs_wavelet_512_smoke
  grad_clip: 1.0
  resume: false
  amp:
    enabled: true
    dtype: fp16
  channels_last: false

optim:
  name: adamw
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.999]

sched:
  name: cosine
  T_max: 260
  eta_min: 1.0e-6
  warmup_epochs: 0
  warmup_start_lr: 0.0
